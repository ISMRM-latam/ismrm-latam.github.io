name: Member Registration
description: Add yourself to the ISMRM-LATAM Member Map
title: "Member Registration: [Your Name Here]"
labels: ["new-member"]
body:
  - type: markdown
    attributes:
      value: |
        ### Welcome to the ISMRM-LATAM Community Map!
        Please fill out the details below to join our researcher directory.

  - type: input
    id: name
    attributes:
      label: Full Name
      placeholder: e.g., Carlos Milovic
    validations:
      required: true

  - type: input
    id: institution
    attributes:
      label: Institution / University
      placeholder: e.g., Universidad de Chile
    validations:
      required: true

  - type: dropdown
    id: country
    attributes:
      label: Country
      options:
        - Argentina
        - Belize
        - Bolivia
        - Brazil
        - Chile
        - Colombia
        - Costa Rica
        - Cuba
        - Dominican Republic
        - Ecuador
        - El Salvador
        - Guatemala
        - Guyana
        - Haiti
        - Honduras
        - Mexico
        - Nicaragua
        - Panama
        - Paraguay
        - Peru
        - Puerto Rico
        - Suriname
        - Uruguay
        - Venezuela
    validations:
      required: true

  - type: input
    id: interests
    attributes:
      label: Research Interests
      description: "Please separate your interests by comma (e.g., MRI, Diffusion, Pulse Sequences)"
      placeholder: "MRI, QSM, Machine Learning"
    validations:
      required: true

  - type: textarea
    id: bio
    attributes:
      label: Short Bio
      description: "A brief professional summary that will appear when your marker is clicked."
      placeholder: "Assistant Professor focused on neuroimaging..."
    validations:
      required: true