name: Member Registration
description: Add yourself to the ISMRM-LATAM Member Map
title: "[Member]: "
labels: ["new-member"]
body:
  - type: input
    id: name
    attributes:
      label: Full Name
    validations:
      required: true
  - type: input
    id: institution
    attributes:
      label: Institution / University
      placeholder: e.g., Pontificia Universidad Católica de Chile
    validations:
      required: true
  - type: dropdown
    id: country
    attributes:
      label: Country
      options:
        - Argentina
        - Belize
        - Bolivia
        - Brazil
        - Chile
        - Colombia
        - Costa Rica
        - Cuba
        - Dominican Republic
        - Ecuador
        - El Salvador
        - Guatemala
        - Guyana
        - Haiti
        - Honduras
        - Mexico
        - Nicaragua
        - Panama
        - Paraguay
        - Peru
        - Puerto Rico
        - Suriname
        - Uruguay
        - Venezuela
    validations:
      required: true
  - type: textarea
    id: bio
    attributes:
      label: Research Interests