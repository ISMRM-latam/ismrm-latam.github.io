name: Update Jobs List
on:
  issues:
    types: [labeled]

jobs:
  update-jobs:
    # SECURITY GATE: 
    # 1. Trigger only if the label 'approved' is added.
    # 2. Ensure it belongs to a 'new-job' issue.
    # 3. Ensure the person who labeled it is a Collaborator, Admin, or the Owner.
    if: |
      github.event.label.name == 'approved' && 
      contains(github.event.issue.labels.*.name, 'new-job') &&
      (github.event.sender.role == 'COLLABORATOR' || github.event.sender.role == 'ADMIN' || github.event.sender.login == 'gsahonero' ||
        github.event.repository.owner.login == 'ISMRM-latam')
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse Issue Body
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Process Job Data
        id: process
        env:
          # Safely inject the JSON string into an environment variable
          RAW_JSON: ${{ steps.parse.outputs.data }}
        run: |
          # Extract variables from the environment variable instead of echoing the raw context
          TITLE=$(echo "$RAW_JSON" | jq -r '."position-title".text')
          INST=$(echo "$RAW_JSON" | jq -r '."posting-institution".text')
          MODAL=$(echo "$RAW_JSON" | jq -r '."modality".text')
          LOC=$(echo "$RAW_JSON" | jq -r '."location".text')
          DEADLINE=$(echo "$RAW_JSON" | jq -r '."application-deadline".text')
          LINK=$(echo "$RAW_JSON" | jq -r '."how-to-apply-link-or-email".text')
          DESC=$(echo "$RAW_JSON" | jq -r '."description".text')
          
          # Auto-generate current date
          POSTED_DATE=$(date +%Y-%m-%d)

          # Create the single job entry
          jq -n \
            --arg title "$TITLE" \
            --arg inst "$INST" \
            --arg modal "$MODAL" \
            --arg loc "$LOC" \
            --arg dead "$DEADLINE" \
            --arg link "$LINK" \
            --arg desc "$DESC" \
            --arg posted "$POSTED_DATE" \
            '{title: $title, institution: $inst, modality: $modal, location: $loc, deadline: $dead, link: $link, description: $desc, posted: $posted}' > job.json

      - name: Append to Jobs Database
        run: |
          # Initialize the file if it's missing
          if [ ! -f _data/jobs.json ]; then
            echo "[]" > _data/jobs.json
          fi
          
          # Merge new entry into the array
          jq ". += [$(cat job.json)]" _data/jobs.json > tmp.json && mv tmp.json _data/jobs.json

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/jobs.json
          git commit -m "Approved Job Posting: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue and Comment
        uses: peter-evans/close-issue@v3
        with:
          comment: |
            ### 🚀 Success!
            This opportunity has been reviewed by the ISMRM-LATAM team and is now live on the site.