name: Update Members List
on:
  issues:
    types: [opened]

jobs:
  update-data:
    if: contains(github.event.issue.labels.*.name, 'new-member')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse Issue Body
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Geocode and Parse Data
        id: geocode
        run: |
          # Extract data from the Issue Form
          NAME=$(echo '${{ steps.parse.outputs.data }}' | jq -r '.name')
          INST=$(echo '${{ steps.parse.outputs.data }}' | jq -r '.institution')
          CTRY=$(echo '${{ steps.parse.outputs.data }}' | jq -r '.country')
          INTERESTS=$(echo '${{ steps.parse.outputs.data }}' | jq -r '.interests')
          BIO=$(echo '${{ steps.parse.outputs.data }}' | jq -r '.bio')

          # Geocoding logic (Nominatim)
          # We search for the Institution + Country
          QUERY=$(echo "$INST, $CTRY" | jq -sRr @uri)
          RESPONSE=$(curl -s -A "ISMRM-LATAM-Bot" "https://nominatim.openstreetmap.org/search?q=$QUERY&format=json&limit=1")
          
          # Extract Lat/Lng, fallback to Santiago, Chile center if not found
          LAT=$(echo $RESPONSE | jq -r '.[0].lat // -33.45')
          LNG=$(echo $RESPONSE | jq -r '.[0].lon // -70.66')

          # Create a clean JSON object for this member
          # We use jq to handle escaping special characters in bio/interests
          jq -n \
            --arg name "$NAME" \
            --arg inst "$INST" \
            --arg ctry "$CTRY" \
            --arg lat "$LAT" \
            --arg lng "$LNG" \
            --arg int "$INTERESTS" \
            --arg bio "$BIO" \
            '{name: $name, institution: $inst, country: $ctry, lat: ($lat|tonumber), lng: ($lng|tonumber), interests: $int, bio: $bio}' > member.json

      - name: Update JSON File
        run: |
          # Append the new member to the existing _data/members.json
          jq ". += [$(cat member.json)]" _data/members.json > tmp.json && mv tmp.json _data/members.json
          
      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/members.json
          git commit -m "Add member: ${{ github.event.issue.title }}"
          git push