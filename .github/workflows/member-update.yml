name: Update Members List
on:
  issues:
    types: [opened, labeled]

jobs:
  update-data:
    # Trigger if it has the label OR if the title starts with "Member Registration"
    if: |
      contains(github.event.issue.labels.*.name, 'new-member') || 
      startsWith(github.event.issue.title, 'Member Registration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse Issue Body
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Geocode and Parse Data
        id: geocode
        run: |
          # Mapping to the exact slugified keys found in your Action logs
          NAME=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."full-name".text')
          INST=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."current-institution-university".text')
          RESIDENCE=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."country-of-residence".text')
          ORIGIN=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."latam-country-of-origin-affiliation".text')
          INTERESTS=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."research-interests".text')
          BIO=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."short-bio".text')

          # Geocoding logic
          QUERY=$(echo "$INST, $RESIDENCE" | jq -sRr @uri)
          RESPONSE=$(curl -s -A "ISMRM-LATAM-Bot" "https://nominatim.openstreetmap.org/search?q=$QUERY&format=json&limit=1")
          
          LAT=$(echo $RESPONSE | jq -r '.[0].lat // -33.45')
          LNG=$(echo $RESPONSE | jq -r '.[0].lon // -70.66')

          # Build the JSON object
          jq -n \
            --arg name "$NAME" \
            --arg inst "$INST" \
            --arg res "$RESIDENCE" \
            --arg orig "$ORIGIN" \
            --arg lat "$LAT" \
            --arg lng "$LNG" \
            --arg int "$INTERESTS" \
            --arg bio "$BIO" \
            '{name: $name, institution: $inst, residence: $res, country: $orig, lat: ($lat|tonumber), lng: ($lng|tonumber), interests: $int, bio: $bio}' > member.json

      - name: Update JSON File
        run: |
          # Append the new member to the existing _data/members.json
          # Ensure _data/members.json exists and is not empty before running this
          jq ". += [$(cat member.json)]" _data/members.json > tmp.json && mv tmp.json _data/members.json
          
      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/members.json
          git commit -m "Add member: ${{ github.event.issue.title }}"
          git push