name: Update News List
on:
  issues:
    types: [labeled]

jobs:
  update-news:
    # Security Gate: Only trigger on 'approved' label by authorized users
    if: |
      github.event.label.name == 'approved' && 
      contains(github.event.issue.labels.*.name, 'new-news') &&
      (github.event.sender.role == 'COLLABORATOR' || github.event.sender.role == 'ADMIN' || github.event.sender.login == 'gsahonero')
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse Issue Body
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Process News and Generate Post
        id: process
        run: |
          # 1. Extract Data from Issue
          AUTHOR=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."author-name".text')
          CAT=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."category".text')
          
          # IMPROVED SANITIZATION:
          # We use 'tr' to delete brackets and 'xargs' to trim whitespace
          IMG_RAW=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."featured-image-url".text')
          IMG=$(echo "$IMG_RAW" | tr -d '<>' | xargs)
          
          SUMM=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."short-summary".text')
          CONTENT=$(echo '${{ steps.parse.outputs.data }}' | jq -r '."full-article-content".text')
          
          # Remove "News: " prefix from title if present
          TITLE=$(echo "${{ github.event.issue.title }}" | sed 's/News: //g')
          DATE=$(date +%Y-%m-%d)
          
          # 2. Create a URL-safe slug from the first 5 words of the summary
          # Removes special characters and replaces spaces with hyphens
          SLUG=$(echo "$SUMM" | iconv -t ascii//TRANSLIT | sed -E 's/[^a-zA-Z0-9 ]/-/g' | tr '[:upper:]' '[:lower:]' | awk '{print $1"-"$2"-"$3"-"$4"-"$5}')
          FILENAME="${DATE}-${SLUG}.md"
          
          # 3. Create the Jekyll Markdown post file
          mkdir -p _posts
          cat <<EOF > _posts/$FILENAME
          ---
          layout: post
          title: "$TITLE"
          date: $DATE
          author: "$AUTHOR"
          category: "$CAT"
          image: "$IMG"
          excerpt: "$SUMM"
          ---
          $CONTENT
          EOF

          # 4. Build the JSON summary (index) for the feed
          # The URL follows the default Jekyll pattern: /year/month/day/slug.html
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          POST_URL="/$YEAR/$MONTH/$DAY/$SLUG.html"

          jq -n \
            --arg title "$TITLE" \
            --arg auth "$AUTHOR" \
            --arg cat "$CAT" \
            --arg img "$IMG" \
            --arg summ "$SUMM" \
            --arg date "$DATE" \
            --arg url "$POST_URL" \
            '{title: $title, author: $auth, category: $cat, image: $img, summary: $summ, date: $date, url: $url}' > news_entry.json

      - name: Append to News Database
        run: |
          if [ ! -f _data/news.json ]; then echo "[]" > _data/news.json; fi
          jq ". += [$(cat news_entry.json)]" _data/news.json > tmp.json && mv tmp.json _data/news.json

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/news.json _posts/*.md
          git commit -m "Approved & Published News: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "### 📰 News Published!\nYour article has been converted to a post and is now live on the portal."