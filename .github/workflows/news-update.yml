name: Update News List
on:
  issues:
    types: [labeled]

jobs:
  update-news:
    # Security Gate: Only trigger on 'approved' label by authorized users
    if: |
      github.event.label.name == 'approved' && 
      contains(github.event.issue.labels.*.name, 'new-news') &&
      (github.event.sender.role == 'COLLABORATOR' || github.event.sender.role == 'ADMIN' || github.event.sender.login == 'gsahonero' ||
        github.event.repository.owner.login == 'ISMRM-latam')
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse Issue Body
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Process News and Generate Post
        id: process
        env:
          # SECURE FIX: Pass the raw data through an environment variable
          RAW_JSON: ${{ steps.parse.outputs.data }}
        run: |
          # 1. Extract Metadata using <<< to safely pass the env variable
          AUTHOR=$(jq -r '."author-name".text // "Executive Committee"' <<< "$RAW_JSON")
          CAT=$(jq -r '."category".text // "News"' <<< "$RAW_JSON")
          SUMM=$(jq -r '."short-summary".text // "No summary provided"' <<< "$RAW_JSON")
          
          # URL Sanitization
          IMG_RAW=$(jq -r '."featured-image-url".text // ""' <<< "$RAW_JSON")
          IMG=$(echo "$IMG_RAW" | tr -d '<>' | xargs)
          
          TITLE=$(echo "${{ github.event.issue.title }}" | sed 's/News: //g')
          DATE=$(date +%Y-%m-%d)
          
          # Escaping quotes to prevent YAML Front Matter crashes if an iframe/quotes are used
          TITLE_ESC=$(echo "$TITLE" | sed 's/"/\\"/g')
          AUTHOR_ESC=$(echo "$AUTHOR" | sed 's/"/\\"/g')
          CAT_ESC=$(echo "$CAT" | sed 's/"/\\"/g')
          SUMM_ESC=$(echo "$SUMM" | sed 's/"/\\"/g')
          
          # 2. Slug and Filename (Fixed to use TITLE instead of SUMM)
          SLUG=$(echo "$TITLE" | iconv -t ascii//TRANSLIT | sed -E 's/[^a-zA-Z0-9 ]/-/g' | tr '[:upper:]' '[:lower:]' | awk '{print $1"-"$2"-"$3"-"$4"-"$5}' | sed -E 's/-+/-/g' | sed -E 's/^-|-$//g')
          FILENAME="${DATE}-${SLUG}.md"
          
          mkdir -p _posts
          
          # 3. Create the Front Matter
          echo "---" > "_posts/$FILENAME"
          echo "layout: post" >> "_posts/$FILENAME"
          echo "title: \"$TITLE_ESC\"" >> "_posts/$FILENAME"
          echo "date: $DATE" >> "_posts/$FILENAME"
          echo "author: \"$AUTHOR_ESC\"" >> "_posts/$FILENAME"
          echo "category: \"$CAT_ESC\"" >> "_posts/$FILENAME"
          echo "image: \"$IMG\"" >> "_posts/$FILENAME"
          echo "excerpt: \"$SUMM_ESC\"" >> "_posts/$FILENAME"
          echo "---" >> "_posts/$FILENAME"
          echo "" >> "_posts/$FILENAME"
          
          # 4. APPEND CONTENT SAFELY
          # CRITICAL FIX: We filter out nulls and empty responses BEFORE joining to prevent jq from crashing.
          jq -r '
            to_entries 
            | map(select(.key | IN("author-name", "category", "featured-image-url", "short-summary") | not)) 
            | map(.value.text | select(. != null and . != "" and . != "_No response_" and . != "*No response*")) 
            | join("\n\n")
          ' <<< "$RAW_JSON" > content_tmp.txt
          
          cat content_tmp.txt >> "_posts/$FILENAME"

          # 5. Build JSON summary
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          POST_URL="$YEAR/$MONTH/$DAY/$SLUG.html"

          jq -n \
            --arg title "$TITLE" --arg auth "$AUTHOR" --arg cat "$CAT" \
            --arg img "$IMG" --arg summ "$SUMM" --arg date "$DATE" --arg url "$POST_URL" \
            '{title: $title, author: $auth, category: $cat, image: $img, summary: $summ, date: $date, url: $url}' > news_entry.json

      - name: Append to News Database
        run: |
          if [ ! -f _data/news.json ]; then echo "[]" > _data/news.json; fi
          jq ". += [$(cat news_entry.json)]" _data/news.json > tmp.json && mv tmp.json _data/news.json

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/news.json _posts/*.md
          git commit -m "Approved & Published News: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "### 📰 News Published!\nYour article has been converted to a post and is now live on the portal."