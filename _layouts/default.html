<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | ISMRM LATAM</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <header class="header-main-logo">
        <a href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/images/logo.png' | relative_url }}" class="header-logo-image" alt="ISMRM LATAM">
        </a>
    </header>

    <nav class="main-nav">
        {% for item in site.data.content.navigation %}
            <a href="{{ item.link | relative_url }}" class="nav__link">{{ item.name }}</a>
        {% endfor %}
    </nav>

    <main>
        <div class="content-card">
            {% unless page.url == "/" %}<h1>{{ page.title }}</h1>{% endunless %}
            {{ content }}
        </div>
    </main>

    <footer style="text-align: center; padding: 40px; opacity: 0.6; font-size: 0.9rem;">
        <p>&copy; {{ "now" | date: "%Y" }} ISMRM Latin American Chapter</p>
    </footer>

</body>
</html>
