---
layout: default
---
<article class="content-card">
  <header style="margin-bottom: 30px;">
    <span class="news-cat">{{ page.category }}</span>
    <h1 style="color: #003687; margin: 10px 0;">{{ page.title }}</h1>
    <p style="color: #666;">By {{ page.author }} | {{ page.date | date: "%B %e, %Y" }}</p>
  </header>

  {% if page.image %}
    <img src="{{ page.image | relative_url }}" style="width: 100%; border-radius: 12px; margin-bottom: 30px;">
  {% endif %}

  <div class="post-content" style="line-height: 1.8; font-size: 1.1rem;">
    {{ content }}
  </div>

  <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
  <a href="{{ '/news' | relative_url }}" style="color: #1495a7; text-decoration: none; font-weight: bold;">← Back to News</a>
</article>
