---
layout: default
---

<section>
    <h2>{{ site.data.content.about.title }}</h2>
    <p>{{ site.data.content.about.description }}</p>
</section>

<hr>

<section>
    <h2>Quick Links</h2>
    <ul>
        {% for item in site.data.content.sections %}
        <li>
            <strong>{{ item.name }}:</strong> {{ item.details }}
        </li>
        {% endfor %}
    </ul>
</section>
