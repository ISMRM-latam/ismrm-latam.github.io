---
layout: default
title: Opportunities
---

<div class="content-card">
    <div class="jobs-dashboard-header">
        <div>
            <h1>Professional Opportunities</h1>
            <p>Connect with the best MRI and Medical Physics roles in Latin America.</p>
        </div>
        <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?template=job_registration.yml" 
           class="c-button hero-btn">+ Post an Opening</a>
    </div>

    <div class="job-filters">
        <input type="text" id="jobSearch" placeholder="Search by title, institution, or city..." onkeyup="filterJobs()">
        <select id="modalityFilter" onchange="filterJobs()">
            <option value="all">All Modalities</option>
            <option value="Full-time">Full-time</option>
            <option value="PhD Position">PhD Position</option>
            <option value="Master Position">Master Position</option>
            <option value="Remote">Remote</option>
            <option value="Internship">Internship</option>
        </select>
    </div>

    <div id="jobGrid" class="job-grid">
        </div>
</div>

<style>
    .jobs-dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 20px; }
    .jobs-dashboard-header h1 { margin: 0; color: #003687; }
    
    .job-filters { display: flex; gap: 15px; margin-bottom: 30px; }
    #jobSearch { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    #modalityFilter { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }

    .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

    .job-card { 
        background: #fff; border: 1px solid #eef2f6; border-radius: 16px; padding: 24px; 
        transition: all 0.3s ease; display: flex; flex-direction: column; position: relative;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .job-card:hover { transform: translateY(-5px); border-color: #1495a7; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

    /* Badges */
    .badge-container { display: flex; gap: 8px; margin-bottom: 15px; }
    .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    .badge-new { background: #e3fcef; color: #00875a; }
    .badge-modal { background: #deebff; color: #0747a6; }
    .badge-urgent { background: #ffefed; color: #bf2600; }

    .job-card h3 { margin: 0 0 8px 0; font-size: 1.25rem; color: #003687; line-height: 1.3; }
    .job-meta { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    .job-meta i { margin-right: 5px; }

    .job-desc { font-size: 0.88rem; color: #555; line-height: 1.5; flex-grow: 1; margin-bottom: 20px; }

    .job-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    .posted-date { font-size: 0.75rem; color: #94a3b8; }

    @media (max-width: 600px) {
        .jobs-dashboard-header { flex-direction: column; text-align: center; }
        .job-filters { flex-direction: column; }
    }
</style>

<script>
    const jobData = {{ site.data.jobs | jsonify }};

    function renderJobs(data) {
        const grid = document.getElementById('jobGrid');
        grid.innerHTML = '';

        if (data.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #666;"><h3>No opportunities found matching your criteria.</h3></div>';
            return;
        }

        const today = new Date();

        data.forEach(job => {
            const postedDate = new Date(job.posted);
            const isNew = (today - postedDate) / (1000 * 60 * 60 * 24) < 7;
            
            let deadlineText = "";
            let urgent = false;
            if (job.deadline) {
                const deadlineDate = new Date(job.deadline);
                const daysLeft = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
                if (daysLeft > 0 && daysLeft < 10) urgent = true;
                deadlineText = daysLeft > 0 ? `${daysLeft} days left` : "Closed";
            }

            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `
                <div class="badge-container">
                    ${isNew ? '<span class="badge badge-new">New</span>' : ''}
                    <span class="badge badge-modal">${job.modality}</span>
                    ${urgent ? `<span class="badge badge-urgent">Closing Soon</span>` : ''}
                </div>
                <h3>${job.title}</h3>
                <div class="job-meta">
                    <strong>${job.institution}</strong><br>
                    <span>📍 ${job.location}</span>
                </div>
                <p class="job-desc">${job.description.substring(0, 140)}...</p>
                <div class="job-footer">
                    <span class="posted-date">Posted ${job.posted}</span>
                    <a href="${job.link}" target="_blank" class="c-button small">Details & Apply</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterJobs() {
        const query = document.getElementById('jobSearch').value.toLowerCase();
        const modality = document.getElementById('modalityFilter').value;

        const filtered = jobData.filter(job => {
            const matchesText = job.title.toLowerCase().includes(query) || 
                                job.institution.toLowerCase().includes(query) || 
                                job.location.toLowerCase().includes(query);
            const matchesModality = modality === 'all' || job.modality === modality;
            return matchesText && matchesModality;
        });

        renderJobs(filtered);
    }

    // Sort by most recent first and render
    const sortedJobs = jobData.sort((a, b) => new Date(b.posted) - new Date(a.posted));
    renderJobs(sortedJobs);
</script>
