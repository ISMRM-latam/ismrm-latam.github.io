---
layout: default
title: Opportunities
---

<div class="content-card">
    <div class="jobs-dashboard-header">
        <div>
            <h1>Professional Opportunities</h1>
            <p>Connect with the best MRI and Medical Physics roles in Latin America.</p>
        </div>
        <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?template=job_registration.yml" 
           class="c-button hero-btn">+ Post an Opening</a>
    </div>

    <div class="job-filters">
        <input type="text" id="jobSearch" placeholder="Search by title, institution, or city..." onkeyup="filterJobs()">
        <select id="modalityFilter" onchange="filterJobs()">
            <option value="all">All Modalities</option>
            <option value="Full-time">Full-time</option>
            <option value="PhD Position">PhD Position</option>
            <option value="Master Position">Master Position</option>
            <option value="Remote">Remote</option>
            <option value="Internship">Internship</option>
        </select>
    </div>

    <div id="jobGrid" class="job-grid"></div>
</div>

<div id="jobModalOverlay" class="modal-overlay" onclick="closeJobModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeJobModal()">&times;</button>
        
        <div class="badge-container" id="modalBadges"></div>
        <h2 id="modalTitle" style="margin: 10px 0 5px 0; color: #003687; line-height: 1.2;"></h2>
        
        <div class="job-meta" style="margin-bottom: 20px;">
            <strong id="modalInstitution" style="font-size: 1.1rem; color: #334155;"></strong><br>
            <span id="modalLocation" style="color: #64748b;"></span>
        </div>
        
        <div class="modal-body" id="modalDescription"></div>
        
        <div class="job-footer" style="margin-top: 30px;">
            <span id="modalDeadline" class="posted-date" style="font-weight: bold; color: #bf2600;"></span>
            <a id="modalApplyBtn" href="#" target="_blank" class="c-button">Apply Now</a>
        </div>
    </div>
</div>

<style>
    .jobs-dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 20px; }
    .jobs-dashboard-header h1 { margin: 0; color: #003687; }
    
    .job-filters { display: flex; gap: 15px; margin-bottom: 30px; }
    #jobSearch { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    #modalityFilter { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }

    .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

    .job-card { 
        background: #fff; border: 1px solid #eef2f6; border-radius: 16px; padding: 24px; 
        transition: all 0.3s ease; display: flex; flex-direction: column; position: relative;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .job-card:hover { transform: translateY(-5px); border-color: #1495a7; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

    /* Badges */
    .badge-container { display: flex; gap: 8px; margin-bottom: 15px; }
    .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    .badge-new { background: #e3fcef; color: #00875a; }
    .badge-modal { background: #deebff; color: #0747a6; }
    .badge-urgent { background: #ffefed; color: #bf2600; }

    .job-card h3 { margin: 0 0 8px 0; font-size: 1.25rem; color: #003687; line-height: 1.3; }
    .job-meta { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    .job-meta i { margin-right: 5px; }

    .job-desc { font-size: 0.88rem; color: #555; line-height: 1.5; flex-grow: 1; margin-bottom: 20px; }

    .job-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    .posted-date { font-size: 0.75rem; color: #94a3b8; }

    /* Modal Styles */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6); z-index: 2000;
        display: none; justify-content: center; align-items: center;
        opacity: 0; transition: opacity 0.3s ease;
        backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    
    .modal-content {
        background: white; width: 90%; max-width: 650px;
        border-radius: 12px; padding: 40px; position: relative;
        max-height: 90vh; overflow-y: auto;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        transform: translateY(20px); transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    
    .modal-close {
        position: absolute; top: 15px; right: 20px;
        background: none; border: none; font-size: 1.8rem;
        cursor: pointer; color: #94a3b8; transition: color 0.2s;
    }
    .modal-close:hover { color: #0f172a; }
    
    .modal-body {
        margin: 20px 0; font-size: 1rem; color: #334155; line-height: 1.6;
        white-space: pre-wrap; /* Preserves line breaks from the markdown/textarea */
        background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0;
    }

    @media (max-width: 600px) {
        .jobs-dashboard-header { flex-direction: column; text-align: center; }
        .job-filters { flex-direction: column; }
        .modal-content { padding: 25px; }
    }
</style>

<script>
    const jobData = {{ site.data.jobs | jsonify }};

    function renderJobs(data) {
        const grid = document.getElementById('jobGrid');
        grid.innerHTML = '';

        if (data.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #666;"><h3>No opportunities found matching your criteria.</h3></div>';
            return;
        }

        const today = new Date();

        data.forEach(job => {
            // Find the original index of the job in the main jobData array for the modal reference
            const originalIndex = jobData.indexOf(job);
            
            const postedDate = new Date(job.posted);
            const isNew = (today - postedDate) / (1000 * 60 * 60 * 24) < 7;
            
            let deadlineText = "";
            let urgent = false;
            if (job.deadline) {
                const deadlineDate = new Date(job.deadline);
                const daysLeft = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
                if (daysLeft > 0 && daysLeft < 10) urgent = true;
                deadlineText = daysLeft > 0 ? `${daysLeft} days left` : "Closed";
            }

            // Truncate description to first 10 words
            const words = job.description ? job.description.split(/\s+/) : [];
            const shortDesc = words.slice(0, 10).join(' ') + (words.length > 10 ? '...' : '');

            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `
                <div class="badge-container">
                    ${isNew ? '<span class="badge badge-new">New</span>' : ''}
                    <span class="badge badge-modal">${job.modality}</span>
                    ${urgent ? `<span class="badge badge-urgent">Closing Soon</span>` : ''}
                </div>
                <h3>${job.title}</h3>
                <div class="job-meta">
                    <strong>${job.institution}</strong><br>
                    <span>📍 ${job.location}</span>
                </div>
                <p class="job-desc">${shortDesc}</p>
                <div class="job-footer">
                    <span class="posted-date">Posted ${job.posted}</span>
                    <button onclick="openJobModal(${originalIndex})" class="c-button small" style="border:none; cursor:pointer;">Details</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterJobs() {
        const query = document.getElementById('jobSearch').value.toLowerCase();
        const modality = document.getElementById('modalityFilter').value;

        const filtered = jobData.filter(job => {
            const matchesText = job.title.toLowerCase().includes(query) || 
                                job.institution.toLowerCase().includes(query) || 
                                job.location.toLowerCase().includes(query);
            const matchesModality = modality === 'all' || job.modality === modality;
            return matchesText && matchesModality;
        });

        renderJobs(filtered);
    }

    // Modal Functions
    function openJobModal(index) {
        const job = jobData[index];
        const today = new Date();
        
        document.getElementById('modalTitle').innerText = job.title;
        document.getElementById('modalInstitution').innerText = job.institution;
        document.getElementById('modalLocation').innerText = "📍 " + job.location;
        document.getElementById('modalDescription').innerText = job.description || "No description provided.";
        
        // Handle Badges in Modal
        const postedDate = new Date(job.posted);
        const isNew = (today - postedDate) / (1000 * 60 * 60 * 24) < 7;
        let badgeHtml = `${isNew ? '<span class="badge badge-new">New</span>' : ''}
                         <span class="badge badge-modal">${job.modality}</span>`;
        
        // Handle Deadline
        if (job.deadline) {
            const deadlineDate = new Date(job.deadline);
            const daysLeft = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
            if (daysLeft > 0 && daysLeft < 10) badgeHtml += `<span class="badge badge-urgent">Closing Soon</span>`;
            document.getElementById('modalDeadline').innerText = `Deadline: ${job.deadline}`;
        } else {
            document.getElementById('modalDeadline').innerText = "";
        }
        
        document.getElementById('modalBadges').innerHTML = badgeHtml;

        // Smart link formatting (if it's an email address, prepend mailto:)
        const applyBtn = document.getElementById('modalApplyBtn');
        let link = job.link || job.apply_link; // Account for variations in JSON key
        if (link && !link.startsWith('http') && link.includes('@')) {
            link = 'mailto:' + link;
        }
        applyBtn.href = link || "#";

        document.getElementById('jobModalOverlay').classList.add('active');
        document.body.style.overflow = 'hidden'; // Prevent background scrolling
    }

    function closeJobModal(event) {
        // Close if clicking the X or the dark overlay background
        if (event && event.target !== document.getElementById('jobModalOverlay')) return;
        document.getElementById('jobModalOverlay').classList.remove('active');
        document.body.style.overflow = 'auto'; // Restore background scrolling
    }

    // Sort by most recent first and render on page load
    const sortedJobs = [...jobData].sort((a, b) => new Date(b.posted) - new Date(a.posted));
    renderJobs(sortedJobs);
</script>
