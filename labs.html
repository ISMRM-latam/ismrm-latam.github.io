---
layout: default
title: Research Centers
---

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="lab-dashboard">
   <div class="sidebar-header">
        <h3>LATAM Research Hubs</h3>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 15px;">
            Discover MRI and Medical Physics groups across the region.
        </p>
        
        <input type="text" id="labSearch" placeholder="Search labs, PIs, or topics..." onkeyup="filterLabs()" style="margin-bottom: 15px;">
        
        <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?template=lab_registration.yml" 
        class="c-button" 
        target="_blank" 
        style="display: block; text-align: center; font-size: 0.85rem; padding: 10px;">
        + Register your Lab
        </a>
    </div>

    <div id="labMap" class="lab-map-container"></div>
</div>

<style>
    .lab-dashboard { display: flex; height: 80vh; gap: 0; border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: white; }
    
    /* Sidebar Styling */
    .lab-sidebar { width: 35%; display: flex; flex-direction: column; border-right: 1px solid #eee; }
    .sidebar-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid #eee; }
    .sidebar-header h3 { margin: 0 0 15px 0; color: #003687; }
    #labSearch { width: 100%; padding: 10px; border: 1px solid #d1d9e6; border-radius: 6px; }
    
    .lab-list { flex-grow: 1; overflow-y: auto; padding: 10px; background: #fff; }
    .lab-card { 
        padding: 15px; border-radius: 8px; margin-bottom: 10px; 
        border: 1px solid #f0f0f0; transition: all 0.2s; cursor: pointer;
    }
    .lab-card:hover { border-color: #1495a7; background: #f0f9fa; }
    .lab-card h4 { margin: 0; color: #1495a7; font-size: 1rem; }
    .lab-card p { margin: 5px 0; font-size: 0.85rem; color: #666; }
    .lab-card .pi-badge { font-weight: bold; color: #333; display: block; margin-top: 5px; }
    
    /* Map Styling */
    .lab-map-container { width: 65%; height: 100%; }

    @media (max-width: 768px) {
        .lab-dashboard { flex-direction: column-reverse; height: auto; }
        .lab-sidebar, .lab-map-container { width: 100%; height: 400px; }
    }
</style>

<script>
    const labData = {{ site.data.labs | jsonify }};
    const map = L.map('labMap').setView([15, -85], 2);
    let markers = [];

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    function renderLabs(data) {
        // Clear Map
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        // Clear List
        const listContainer = document.getElementById('labList');
        listContainer.innerHTML = '';

        if (data.length === 0) {
            listContainer.innerHTML = `
                <div style="padding: 20px; text-align: center; color: #666;">
                    <p>No labs found matching your search.</p>
                    <p style="font-size: 0.8rem;">Is your lab missing? Use the button above to add it!</p>
                </div>
            `;
            return;
        }
        
        data.forEach((lab, index) => {
            // 1. Add to Sidebar
            const card = document.createElement('div');
            card.className = 'lab-card';
            card.innerHTML = `
                <h4>${lab.name}</h4>
                <p>${lab.institution}, ${lab.residence}</p>
                <span class="pi-badge">PI: ${lab.pi}</span>
                <p style="font-size: 0.75rem; color: #888;">${lab.focus.substring(0, 80)}...</p>
            `;
            card.onclick = () => {
                map.flyTo([lab.lat, lab.lng], 10);
                markers[index].openPopup();
            };
            listContainer.appendChild(card);

            // 2. Add to Map
            const popupHtml = `
                <div style="min-width: 200px;">
                    <h4 style="margin:0;">${lab.name}</h4>
                    <p>PI: ${lab.pi}</p>
                    <a href="${lab.website}" target="_blank" class="c-button" style="font-size: 0.7rem; padding: 4px 8px;">View Website</a>
                </div>
            `;
            const marker = L.marker([lab.lat, lab.lng]).bindPopup(popupHtml);
            marker.addTo(map);
            markers.push(marker);
        });
    }

    function filterLabs() {
        const query = document.getElementById('labSearch').value.toLowerCase();
        const filtered = labData.filter(lab => 
            lab.name.toLowerCase().includes(query) || 
            lab.pi.toLowerCase().includes(query) || 
            lab.focus.toLowerCase().includes(query) ||
            lab.residence.toLowerCase().includes(query)
        );
        renderLabs(filtered);
    }

    // Initial load
    renderLabs(labData);
</script>
