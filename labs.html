---
layout: default
title: Research Centers
---

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<div class="lab-dashboard">
    <div class="lab-sidebar">
        <div class="sidebar-header">
            <h3>LATAM Research Hubs</h3>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 15px;">
                Discover MRI and Medical Physics groups across the region.
            </p>
            
            <input type="text" id="labSearch" placeholder="Search labs, PIs, or topics..." onkeyup="filterLabs()" style="margin-bottom: 15px;">
            
            <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?template=lab_registration.yml" 
               class="c-button" 
               target="_blank" 
               style="display: block; text-align: center; font-size: 0.85rem; padding: 10px;">
               + Register your Lab
            </a>
        </div>
        
        <div id="labList" class="lab-list">
            </div>
    </div>

    <div id="labMap" class="lab-map-container"></div>
</div>

<style>
    .lab-dashboard { display: flex; height: 80vh; gap: 0; border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: white; }
    
    /* Sidebar Styling */
    .lab-sidebar { width: 35%; display: flex; flex-direction: column; border-right: 1px solid #eee; }
    .sidebar-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid #eee; }
    .sidebar-header h3 { margin: 0 0 5px 0; color: #003687; }
    #labSearch { width: 100%; padding: 10px; border: 1px solid #d1d9e6; border-radius: 6px; box-sizing: border-box; }
    
    .lab-list { flex-grow: 1; overflow-y: auto; padding: 10px; background: #fff; }
    .lab-card { 
        padding: 15px; border-radius: 8px; margin-bottom: 10px; 
        border: 1px solid #f0f0f0; transition: all 0.2s; cursor: pointer;
    }
    .lab-card:hover { border-color: #1495a7; background: #f0f9fa; }
    .lab-card h4 { margin: 0; color: #1495a7; font-size: 1rem; }
    .lab-card p { margin: 5px 0; font-size: 0.85rem; color: #666; }
    .lab-card .pi-badge { font-weight: bold; color: #333; display: block; margin-top: 5px; font-size: 0.85rem; }
    
    /* Added styles for Focus and Contact */
    .lab-card .lab-focus { font-size: 0.8rem; color: #555; margin-top: 6px; line-height: 1.3; }
    .lab-card .lab-contact { font-size: 0.8rem; color: #1495a7; text-decoration: none; display: inline-block; margin-top: 8px; font-weight: 600; }
    .lab-card .lab-contact:hover { text-decoration: underline; color: #003687; }

    /* Map Styling */
    .lab-map-container { width: 65%; height: 100%; }

    @media (max-width: 768px) {
        .lab-dashboard { flex-direction: column-reverse; height: auto; }
        .lab-sidebar, .lab-map-container { width: 100%; height: 400px; }
    }
</style>

<script>
    const labData = {{ site.data.labs | jsonify }};
    
    const map = L.map('labMap', {
        maxZoom: 18,   // This satisfies the MarkerCluster requirement
        minZoom: 2
    }).setView([15, -85], 2);
    
    // 1. Initialize the Cluster Group
    const markersGroup = L.markerClusterGroup();
    map.addLayer(markersGroup);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 18 // Match this with your map's maxZoom
    }).addTo(map);

    // Function to update the sidebar based on visible map area
    function updateListFromMap() {
        const bounds = map.getBounds();
        const visibleLabs = labData.filter(lab => {
            const latLng = L.latLng(lab.lat, lab.lng);
            return bounds.contains(latLng);
        });
        
        // We call a slightly modified render function that doesn't 
        // clear the markers, only updates the sidebar.
        updateSidebarOnly(visibleLabs);
    }

    function updateSidebarOnly(data) {
        const listContainer = document.getElementById('labList');
        listContainer.innerHTML = '';

        data.forEach((lab) => {
            const card = document.createElement('div');
            card.className = 'lab-card';
            card.innerHTML = `
                <h4>${lab.name}</h4>
                <p>${lab.institution}, ${lab.residence}</p>
                <span class="pi-badge">PI: ${lab.pi}</span>
                ${lab.focus ? `<p class="lab-focus"><b>Focus:</b> ${lab.focus}</p>` : ''}
                ${lab.contact ? `<a href="mailto:${lab.contact}" class="lab-contact" onclick="event.stopPropagation()">✉️ Contact Lab</a>` : ''}
            `;
            card.onclick = () => {
                // Find the marker in the group to show it
                markersGroup.eachLayer(marker => {
                    if(marker.getLatLng().lat === lab.lat && marker.getLatLng().lng === lab.lng) {
                        markersGroup.zoomToShowLayer(marker, () => marker.openPopup());
                    }
                });
                map.flyTo([lab.lat, lab.lng], 12);
            };
            listContainer.appendChild(card);
        });
    }

    // Add the listeners to the map
    map.on('moveend', updateListFromMap);
    map.on('zoomend', updateListFromMap);

    function renderLabs(data) {
        // 2. Clear both the Cluster Group and the Sidebar List
        markersGroup.clearLayers();
        
        const listContainer = document.getElementById('labList');
        if (!listContainer) return;
        listContainer.innerHTML = '';

        if (data.length === 0) {
            listContainer.innerHTML = `<div style="padding: 20px; text-align: center;">No labs found.</div>`;
            return;
        }
        
        data.forEach((lab) => {
            // Add to Sidebar
            const card = document.createElement('div');
            card.className = 'lab-card';
            card.innerHTML = `
                <h4>${lab.name}</h4>
                <p>${lab.institution}, ${lab.residence}</p>
                <span class="pi-badge">PI: ${lab.pi}</span>
                ${lab.focus ? `<p class="lab-focus"><b>Focus:</b> ${lab.focus}</p>` : ''}
                ${lab.contact ? `<a href="mailto:${lab.contact}" class="lab-contact" onclick="event.stopPropagation()">✉️ Contact Lab</a>` : ''}
            `;
            
            // Add to Map with Focus and Contact fields
            const popupHtml = `
                <div style="min-width: 220px; font-family: sans-serif;">
                    <h4 style="margin:0 0 8px 0; color:#1495a7;">${lab.name}</h4>
                    <p style="margin:0 0 5px 0; font-size: 0.85rem;"><b>Institution:</b> ${lab.institution}</p>
                    <p style="margin:0 0 5px 0; font-size: 0.85rem;"><b>PI:</b> ${lab.pi}</p>
                    ${lab.focus ? `<p style="margin:8px 0; font-size: 0.8rem; color:#555; background:#f8fafc; padding:6px; border-radius:4px;"><b>Focus:</b> ${lab.focus}</p>` : ''}
                    
                    <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 8px;">
                        ${lab.contact ? `<a href="mailto:${lab.contact}" style="font-size: 0.85rem; color:#1495a7; text-decoration:none; font-weight:bold;">✉️ ${lab.contact}</a>` : ''}
                        ${lab.website ? `<a href="${lab.website}" target="_blank" class="c-button" style="font-size: 0.7rem; padding: 6px 10px; display:inline-block; text-align:center;">View Website</a>` : ''}
                    </div>
                </div>
            `;
            
            const marker = L.marker([lab.lat, lab.lng]).bindPopup(popupHtml);
            
            // Interaction: Clicking sidebar flies to marker and opens it
            card.onclick = () => {
                markersGroup.zoomToShowLayer(marker, () => {
                    marker.openPopup();
                });
                map.flyTo([lab.lat, lab.lng], 12);
            };

            listContainer.appendChild(card);
            
            // 3. Add marker to the Cluster Group instead of directly to map
            markersGroup.addLayer(marker);
        });
    }

    function filterLabs() {
        const query = document.getElementById('labSearch').value.toLowerCase();
        const filtered = labData.filter(lab => 
            (lab.name && lab.name.toLowerCase().includes(query)) || 
            (lab.pi && lab.pi.toLowerCase().includes(query)) || 
            (lab.focus && lab.focus.toLowerCase().includes(query))
        );
        renderLabs(filtered);
    }

    renderLabs(labData);
</script>
