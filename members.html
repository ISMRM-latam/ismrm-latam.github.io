---
layout: default
title: Member Community
---
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="content-card">
    <div class="filter-bar">
        <select id="countryFilter" onchange="filterMap()">
            <option value="all">All of Latin America</option>
            <option value="Argentina">Argentina</option>
            <option value="Brazil">Brazil</option>
            <option value="Chile">Chile</option>
            <option value="Colombia">Colombia</option>
            <option value="Mexico">Mexico</option>
            <option value="Peru">Peru</option>
            <option value="Uruguay">Uruguay</option>
            <option value="Venezuela">Venezuela</option>
        </select>
        <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?template=member_registration.yml" 
        class="c-button" 
        target="_blank">
        + Join the Map
        </a>
    </div>

    
    <div id="map"></div>
</div>

<script>
    var map = L.map('map').setView([-15, -60], 3); 
    // Replace your old L.tileLayer code with this:
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    var memberData = {{ site.data.members | jsonify }};
    var markers = [];

    function filterMap() {
        var country = document.getElementById('countryFilter').value;
        markers.forEach(m => map.removeLayer(m));
        
        // Inside your filterMap() function in members.html:

        memberData.forEach(function(m) {
            if (country === 'all' || m.country === country) {
                // Create a nice HTML structure for the popup
                var popupContent = `
                    <div style="font-family: 'Inter', sans-serif;">
                        <h4 style="margin: 0 0 5px 0; color: #003687;">${m.name}</h4>
                        <p style="margin: 0 0 10px 0; font-style: italic; font-size: 0.9rem;">${m.institution}</p>
                        <div style="margin-bottom: 10px;">
                            ${m.interests.split(',').map(tag => 
                                `<span style="background:#eef2ff; color:#1495a7; padding:2px 6px; border-radius:4px; font-size:0.75rem; margin-right:4px;">${tag.trim()}</span>`
                            ).join('')}
                        </div>
                        <p style="font-size: 0.85rem; border-top: 1px solid #eee; pt: 5px;">${m.bio}</p>
                    </div>
                `;

                var marker = L.marker([m.lat, m.lng])
                    .bindPopup(popupContent)
                    .addTo(map);
                markers.push(marker);
            }
        });
    }
    filterMap();
</script>
