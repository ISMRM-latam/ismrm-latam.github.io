---
layout: default
title: News & Updates
---

<div class="news-list">
  {% for post in site.posts %}
    <div class="news-card">
      {% if post.image_url %}
        <div class="news-image" style="background-image: url('{{ post.image_url }}');"></div>
      {% else %}
        <div class="news-image default-gradient"></div>
      {% endif %}

      <div class="news-content">
        <h3>{{ post.title }}</h3>
        <p>{{ post.excerpt }}</p>
        <a href="{{ post.url }}" class="c-button">Read More</a>
      </div>
    </div>
  {% endfor %}
</div>

<style>
  .news-image {
    width: 100%;
    height: 200px;
    background-size: cover;
    background-position: center;
    border-radius: 8px 8px 0 0;
}

  .default-gradient {
      background: linear-gradient(135deg, #003687 0%, #1495a7 100%);
  }
</style>
